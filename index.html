<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Mio Libro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#book-wrapper {
  display: none;
  margin-top: 20px;
}

canvas {
  background: white;
  margin: 5px;
  max-width: 45vw;
}

#controls {
  margin-top: 10px;
}
button {
  padding: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<h1>📖 Il Mio Libro</h1>

<div id="book-wrapper">
  <div>
    <canvas id="canvas-left"></canvas>
    <canvas id="canvas-right"></canvas>
  </div>

  <div id="controls">
    <button onclick="prevPages()">⬅</button>
    <span id="page-counter"></span>
    <button onclick="nextPages()">➡</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;

/* ================= LOAD PDF AUTOMATICO ================= */

window.addEventListener('load', async () => {
  try {
    const loadingTask = pdfjsLib.getDocument('./libro.pdf');
    pdfDoc = await loadingTask.promise;

    totalPages = pdfDoc.numPages;

    document.getElementById('book-wrapper').style.display = 'block';

    renderPages();

  } catch (err) {
    console.error(err);
    alert("Errore: PDF non trovato (controlla nome libro.pdf)");
  }
});

/* ================= RENDER ================= */

async function renderPages() {
  const page1 = await pdfDoc.getPage(currentPage);
  const page2 = await pdfDoc.getPage(currentPage + 1);

  render(page1, document.getElementById('canvas-left'));

  if (currentPage + 1 <= totalPages) {
    render(page2, document.getElementById('canvas-right'));
  }

  document.getElementById('page-counter').textContent =
    `${currentPage} - ${Math.min(currentPage + 1, totalPages)} / ${totalPages}`;
}

async function render(page, canvas) {
  const viewport = page.getViewport({ scale: 1.5 });

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  const ctx = canvas.getContext('2d');

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;
}

/* ================= NAV ================= */

function nextPages() {
  if (currentPage + 2 <= totalPages) {
    currentPage += 2;
    renderPages();
  }
}

function prevPages() {
  if (currentPage - 2 >= 1) {
    currentPage -= 2;
    renderPages();
  }
}
</script>

</body>
</html>
