<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Mio Libro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --paper: #faf7f2;
    --dark: #1a1209;
    --ink: #2c2015;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --shadow: rgba(0,0,0,0.4);
    --spine: #8b5e3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Texture di sfondo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(139,94,60,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 20px 20px;
    width: 100%;
  }

  .title-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    color: var(--gold-light);
    font-style: italic;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 20px rgba(201,168,76,0.3);
  }

  .title-sub {
    font-family: 'EB Garamond', serif;
    font-size: 0.95rem;
    color: rgba(245,240,232,0.5);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .ornament {
    color: var(--gold);
    font-size: 1.4rem;
    margin: 8px 0;
    opacity: 0.7;
  }

  /* Upload area */
  #upload-zone {
    position: relative;
    z-index: 10;
    margin: 20px auto;
    width: min(500px, 90vw);
    background: rgba(245,240,232,0.04);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #upload-zone:hover, #upload-zone.drag-over {
    background: rgba(201,168,76,0.08);
    border-color: rgba(201,168,76,0.6);
  }

  #upload-zone p {
    color: rgba(245,240,232,0.6);
    font-size: 1rem;
    line-height: 1.7;
  }

  #upload-zone .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
    opacity: 0.6;
  }

  .upload-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--dark);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .upload-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  #file-input { display: none; }

  /* Progress bar */
  #progress-bar {
    display: none;
    width: min(500px, 90vw);
    margin: 10px auto;
    position: relative;
    z-index: 10;
  }
  #progress-bar .bar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 4px;
    overflow: hidden;
  }
  #progress-bar .bar-fill {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    height: 100%;
    width: 0%;
    transition: width 0.2s ease;
    border-radius: 10px;
  }
  #progress-bar p {
    color: rgba(245,240,232,0.5);
    font-size: 0.85rem;
    text-align: center;
    margin-top: 8px;
  }

  /* Book container */
  #book-wrapper {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    flex: 1;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 40px;
  }

  /* Book scene 3D */
  #book-scene {
    perspective: 2000px;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 20px 0;
  }

  #book {
    position: relative;
    display: flex;
    transform-style: preserve-3d;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
  }

  /* Copertina sinistra (pagina sinistra) */
  .book-side {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #page-left {
    border-radius: 2px 0 0 2px;
    background: var(--paper);
    border-right: 1px solid rgba(0,0,0,0.15);
    transform-origin: right center;
    box-shadow:
      inset -8px 0 20px rgba(0,0,0,0.08),
      inset -2px 0 4px rgba(0,0,0,0.12);
  }

  #page-right {
    border-radius: 0 2px 2px 0;
    background: var(--paper);
    border-left: 1px solid rgba(0,0,0,0.15);
    transform-origin: left center;
    box-shadow:
      inset 8px 0 20px rgba(0,0,0,0.08),
      inset 2px 0 4px rgba(0,0,0,0.12);
  }

  /* Dorso del libro */
  #spine {
    width: 18px;
    background: linear-gradient(to right, #5c3d1e, #8b5e3c, #6b4a2a, #8b5e3c, #5c3d1e);
    box-shadow:
      inset -2px 0 4px rgba(0,0,0,0.3),
      inset 2px 0 4px rgba(0,0,0,0.3);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  #spine::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(201,168,76,0.15) 0%,
      transparent 20%,
      transparent 80%,
      rgba(201,168,76,0.15) 100%
    );
  }

  /* Canvas pagine */
  .page-canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* Effetto angolo pagina che si solleva */
  #page-right::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 40px 40px;
    border-color: transparent transparent rgba(0,0,0,0.07) transparent;
    transition: all 0.3s ease;
    cursor: pointer;
  }

  #page-right:hover::after {
    border-width: 0 0 55px 55px;
    border-color: transparent transparent rgba(0,0,0,0.12) transparent;
  }

  /* Animazione sfoglio */
  @keyframes turnLeft {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(-180deg); }
  }

  @keyframes turnRight {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(180deg); }
  }

  .flipping-left {
    animation: turnLeft 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    transform-style: preserve-3d;
  }

  .flipping-right {
    animation: turnRight 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    transform-style: preserve-3d;
  }

  /* Ombra dinamica durante sfoglio */
  #page-left.flipping-left { box-shadow: -10px 0 30px rgba(0,0,0,0.3); }
  #page-right.flipping-right { box-shadow: 10px 0 30px rgba(0,0,0,0.3); }

  /* Testo pagina vuota */
  .empty-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    color: rgba(44,32,21,0.2);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
  }

  /* Controlli navigazione */
  #controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 24px;
    position: relative;
    z-index: 10;
  }

  .nav-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.08);
    color: var(--gold-light);
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: serif;
    backdrop-filter: blur(4px);
  }

  .nav-btn:hover:not(:disabled) {
    background: rgba(201,168,76,0.2);
    border-color: rgba(201,168,76,0.7);
    transform: scale(1.05);
  }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: default;
  }

  #page-counter {
    font-family: 'EB Garamond', serif;
    color: rgba(245,240,232,0.55);
    font-size: 1rem;
    letter-spacing: 0.1em;
    min-width: 120px;
    text-align: center;
  }

  /* Thumbnails strip */
  #thumbs-wrapper {
    display: none;
    position: relative;
    z-index: 10;
    margin-top: 28px;
    width: min(700px, 95vw);
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,168,76,0.3) transparent;
  }

  #thumbs-strip {
    display: flex;
    gap: 8px;
    padding: 4px 2px;
    width: max-content;
  }

  .thumb {
    width: 52px;
    height: 74px;
    border-radius: 2px;
    overflow: hidden;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
    background: var(--paper);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .thumb:hover { transform: translateY(-3px); border-color: rgba(201,168,76,0.5); }
  .thumb.active { border-color: var(--gold); box-shadow: 0 4px 16px rgba(201,168,76,0.3); }

  .thumb canvas { width: 100%; height: 100%; object-fit: cover; }

  /* Toolbar superiore */
  #toolbar {
    display: none;
    position: relative;
    z-index: 10;
    margin-top: 10px;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .tool-btn {
    padding: 8px 18px;
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(201,168,76,0.06);
    color: rgba(245,240,232,0.65);
    font-family: 'EB Garamond', serif;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tool-btn:hover {
    background: rgba(201,168,76,0.15);
    border-color: rgba(201,168,76,0.5);
    color: var(--gold-light);
  }

  .tool-btn.active {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Modalità fullscreen */
  #fullscreen-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,4,0.97);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #fullscreen-overlay.visible { display: flex; }

  #fullscreen-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: rgba(245,240,232,0.5);
    font-size: 1.8rem;
    cursor: pointer;
    transition: color 0.2s;
  }

  #fullscreen-close:hover { color: var(--gold-light); }

  /* Scrollbar custom */
  #thumbs-wrapper::-webkit-scrollbar { height: 4px; }
  #thumbs-wrapper::-webkit-scrollbar-track { background: transparent; }
  #thumbs-wrapper::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  /* Mobile responsive */
  @media (max-width: 600px) {
    #spine { width: 10px; }
    .nav-btn { width: 42px; height: 42px; font-size: 1.1rem; }
    #controls { gap: 14px; }
  }

  /* Indicatore hover sfoglia */
  #hover-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(44,32,21,0.4);
    font-size: 0.75rem;
    font-style: italic;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <div class="title-main" id="book-title">La mia Libreria</div>
  <div class="ornament">❦</div>
  <div class="title-sub">sfoglia il tuo libro</div>
</header>

<!-- Upload zone -->
<div id="upload-zone" onclick="document.getElementById('file-input').click()">
  <div class="upload-icon">📖</div>
  <p>Trascina qui il tuo PDF<br>oppure</p>
  <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
    Scegli il file PDF
  </button>
  <input type="file" id="file-input" accept=".pdf">
</div>

<div id="progress-bar">
  <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
  <p id="progress-text">Caricamento pagine…</p>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="tool-btn" id="btn-thumbs" onclick="toggleThumbs()">⊞ Miniature</button>
  <button class="tool-btn" id="btn-fs" onclick="openFullscreen()">⛶ Schermo intero</button>
  <button class="tool-btn" onclick="document.getElementById('file-input').click()">↑ Nuovo PDF</button>
</div>

<!-- Book viewer -->
<div id="book-wrapper">
  <div id="book-scene">
    <div id="book">
      <div class="book-side" id="page-left">
        <div class="empty-page" id="empty-left">
          <span>◈</span>
        </div>
        <canvas class="page-canvas" id="canvas-left"></canvas>
        <div id="hover-hint">← sfoglia</div>
      </div>
      <div id="spine"></div>
      <div class="book-side" id="page-right">
        <canvas class="page-canvas" id="canvas-right"></canvas>
        <div class="empty-page" id="empty-right" style="display:none">
          <span>◈</span>
        </div>
      </div>
    </div>
  </div>

  <div id="controls">
    <button class="nav-btn" id="btn-prev" onclick="prevPages()" title="Pagina precedente">‹</button>
    <div id="page-counter">1 / 1</div>
    <button class="nav-btn" id="btn-next" onclick="nextPages()" title="Pagina successiva">›</button>
  </div>
</div>

<!-- Thumbnails -->
<div id="thumbs-wrapper">
  <div id="thumbs-strip"></div>
</div>

<!-- Fullscreen overlay -->
<div id="fullscreen-overlay">
  <button id="fullscreen-close" onclick="closeFullscreen()">✕</button>
  <div id="book-scene-fs">
    <canvas id="canvas-fs-left" style="border-radius:2px 0 0 2px;"></canvas>
    <div style="width:14px;background:linear-gradient(to right,#5c3d1e,#8b5e3c,#5c3d1e);"></div>
    <canvas id="canvas-fs-right" style="border-radius:0 2px 2px 0;"></canvas>
  </div>
  <div id="controls" style="margin-top:24px;">
    <button class="nav-btn" onclick="prevPages(true)">‹</button>
    <div id="page-counter-fs" style="font-family:'EB Garamond',serif;color:rgba(245,240,232,0.55);font-size:1rem;letter-spacing:.1em;min-width:120px;text-align:center;"></div>
    <button class="nav-btn" onclick="nextPages(true)">›</button>
  </div>
</div>

<script>
  // PDF.js setup
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null;
  let currentSpread = 0; // 0-based spread index (each spread = 2 pages)
  let totalPages = 0;
  let pageCache = {};
  let isFlipping = false;
  let thumbsVisible = false;

  // Calcola dimensioni libro responsive
  function getBookDimensions() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxW = Math.min(vw * 0.92, 900);
    const pageW = Math.floor((maxW - 18) / 2);
    const pageH = Math.min(Math.floor(pageW * 1.41), vh * 0.62);
    return { pageW, pageH };
  }

  // Rendering pagina su canvas
  async function renderPage(pageNum, canvas) {
    if (pageNum < 1 || pageNum > totalPages) {
      canvas.style.display = 'none';
      return null;
    }
    canvas.style.display = 'block';

    const { pageW, pageH } = getBookDimensions();
    const page = await pdfDoc.getPage(pageNum);
    const vp0 = page.getViewport({ scale: 1 });
    const scale = Math.min(pageW / vp0.width, pageH / vp0.height) * 2; // retina
    const vp = page.getViewport({ scale });

    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = pageW + 'px';
    canvas.style.height = Math.floor(vp0.height * (pageW / vp0.width)) + 'px';

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#faf7f2';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    return canvas;
  }

  // Aggiorna le dimensioni fisiche del libro
  function resizeBook() {
    const { pageW, pageH } = getBookDimensions();
    const pl = document.getElementById('page-left');
    const pr = document.getElementById('page-right');
    [pl, pr].forEach(el => {
      el.style.width = pageW + 'px';
      el.style.height = pageH + 'px';
    });
  }

  // Mostra spread corrente
  async function showSpread(flip) {
    const leftPage = currentSpread === 0 ? null : currentSpread * 2 - 1;
    const rightPage = currentSpread === 0 ? 1 : currentSpread * 2;
    const rightPage2 = rightPage + 1;

    const canvasL = document.getElementById('canvas-left');
    const canvasR = document.getElementById('canvas-right');
    const emptyL = document.getElementById('empty-left');
    const emptyR = document.getElementById('empty-right');

    resizeBook();

    // Pagina sinistra
    if (leftPage && leftPage <= totalPages) {
      emptyL.style.display = 'none';
      await renderPage(leftPage, canvasL);
    } else {
      canvasL.style.display = 'none';
      emptyL.style.display = 'flex';
    }

    // Pagina destra
    if (rightPage <= totalPages) {
      emptyR.style.display = 'none';
      await renderPage(rightPage, canvasR);
    } else {
      canvasR.style.display = 'none';
      emptyR.style.display = 'flex';
    }

    updateCounter();
    updateNavBtns();
    highlightThumb();
  }

  function updateCounter() {
    const leftPage = currentSpread === 0 ? 1 : currentSpread * 2 - 1;
    const rightPage = currentSpread === 0 ? 1 : currentSpread * 2;
    const display = currentSpread === 0
      ? `pag. 1`
      : `pag. ${leftPage}–${Math.min(rightPage, totalPages)}`;
    document.getElementById('page-counter').textContent = `${display} / ${totalPages}`;
    const cfs = document.getElementById('page-counter-fs');
    if (cfs) cfs.textContent = `${display} / ${totalPages}`;
  }

  function updateNavBtns() {
    document.getElementById('btn-prev').disabled = currentSpread === 0;
    const maxSpread = Math.ceil((totalPages - 1) / 2);
    document.getElementById('btn-next').disabled = currentSpread >= maxSpread;
  }

  async function nextPages(fs) {
    if (isFlipping) return;
    const maxSpread = Math.ceil((totalPages - 1) / 2);
    if (currentSpread >= maxSpread) return;
    await flipAnimation('next');
    currentSpread++;
    await showSpread('next');
    if (fs) updateFullscreen();
  }

  async function prevPages(fs) {
    if (isFlipping) return;
    if (currentSpread === 0) return;
    await flipAnimation('prev');
    currentSpread--;
    await showSpread('prev');
    if (fs) updateFullscreen();
  }

  function flipAnimation(dir) {
    return new Promise(resolve => {
      isFlipping = true;
      const el = dir === 'next'
        ? document.getElementById('page-right')
        : document.getElementById('page-left');
      const cls = dir === 'next' ? 'flipping-left' : 'flipping-right';
      el.classList.add(cls);
      setTimeout(() => {
        el.classList.remove(cls);
        isFlipping = false;
        resolve();
      }, 600);
    });
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') nextPages();
    if (e.key === 'ArrowLeft') prevPages();
    if (e.key === 'Escape') closeFullscreen();
  });

  // Click pagina destra → avanza
  document.getElementById('page-right').addEventListener('click', () => nextPages());
  document.getElementById('page-left').addEventListener('click', () => prevPages());

  // Swipe touch
  let touchStartX = 0;
  document.getElementById('book').addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].clientX;
  });
  document.getElementById('book').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) dx < 0 ? nextPages() : prevPages();
  });

  // Caricamento PDF
  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    loadPDF(file);
  });

  // Drag & drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') loadPDF(file);
  });

  async function loadPDF(file) {
    // Mostra progress
    document.getElementById('upload-zone').style.display = 'none';
    const pb = document.getElementById('progress-bar');
    pb.style.display = 'block';

    // Nome del file come titolo
    const name = file.name.replace('.pdf', '');
    document.getElementById('book-title').textContent = name;

    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    currentSpread = 0;
    pageCache = {};

    // Genera thumbnails in background
    generateThumbs();

    // Mostra libro
    pb.style.display = 'none';
    document.getElementById('book-wrapper').style.display = 'flex';
    document.getElementById('toolbar').style.display = 'flex';

    resizeBook();
    await showSpread();
  }

  // Thumbnails
  async function generateThumbs() {
    const strip = document.getElementById('thumbs-strip');
    strip.innerHTML = '';
    const bar = document.getElementById('bar-fill');
    const txt = document.getElementById('progress-text');
    const pb = document.getElementById('progress-bar');
    pb.style.display = 'block';

    for (let i = 1; i <= totalPages; i++) {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.dataset.page = i;
      div.title = `Pagina ${i}`;

      const cvs = document.createElement('canvas');
      div.appendChild(cvs);
      strip.appendChild(div);

      const page = await pdfDoc.getPage(i);
      const vp0 = page.getViewport({ scale: 1 });
      const scale = 52 / vp0.width;
      const vp = page.getViewport({ scale });
      cvs.width = vp.width;
      cvs.height = vp.height;
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = '#faf7f2';
      ctx.fillRect(0, 0, cvs.width, cvs.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      div.addEventListener('click', () => {
        currentSpread = i === 1 ? 0 : Math.floor((i) / 2);
        showSpread();
      });

      const pct = Math.round(i / totalPages * 100);
      bar.style.width = pct + '%';
      txt.textContent = `Generazione miniature… ${pct}%`;
    }

    pb.style.display = 'none';
    highlightThumb();
  }

  function highlightThumb() {
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    const activePage = currentSpread === 0 ? 1 : currentSpread * 2;
    const el = document.querySelector(`.thumb[data-page="${activePage}"]`);
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }

  function toggleThumbs() {
    thumbsVisible = !thumbsVisible;
    const tw = document.getElementById('thumbs-wrapper');
    tw.style.display = thumbsVisible ? 'block' : 'none';
    document.getElementById('btn-thumbs').classList.toggle('active', thumbsVisible);
  }

  // Fullscreen
  function openFullscreen() {
    const overlay = document.getElementById('fullscreen-overlay');
    overlay.classList.add('visible');
    updateFullscreen();
  }

  function closeFullscreen() {
    document.getElementById('fullscreen-overlay').classList.remove('visible');
  }

  async function updateFullscreen() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const pageW = Math.floor((Math.min(vw * 0.94, 1200) - 14) / 2);
    const pageH = Math.min(Math.floor(pageW * 1.41), vh * 0.78);

    const canvasFL = document.getElementById('canvas-fs-left');
    const canvasFR = document.getElementById('canvas-fs-right');
    [canvasFL, canvasFR].forEach(c => {
      c.style.width = pageW + 'px';
      c.style.height = pageH + 'px';
    });

    const leftPage = currentSpread === 0 ? null : currentSpread * 2 - 1;
    const rightPage = currentSpread === 0 ? 1 : currentSpread * 2;

    const renderFS = async (pageNum, canvas) => {
      if (!pageNum || pageNum > totalPages) { canvas.style.opacity = 0; return; }
      canvas.style.opacity = 1;
      const page = await pdfDoc.getPage(pageNum);
      const vp0 = page.getViewport({ scale: 1 });
      const scale = Math.min(pageW / vp0.width, pageH / vp0.height) * 2;
      const vp = page.getViewport({ scale });
      canvas.width = vp.width;
      canvas.height = vp.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#faf7f2';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
    };

    await Promise.all([renderFS(leftPage, canvasFL), renderFS(rightPage, canvasFR)]);
  }

  // Resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (pdfDoc) showSpread(); }, 200);
  });
</script>
</body>
